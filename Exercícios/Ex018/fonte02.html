<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
    
        @font-face {
            font-family: 'Love';
            src: url('Fonts/love larry ttf.ttf') format('opentype');
            font-weight: normal;
            font-style: normal;

            /*
            Tipos de formatos()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetupe-aat (Apple Advanced Typoghadhy)
            - svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>olá Mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ut accusantium, fuga accusamus cum provident, error ex optio libero laudantium modi minus quisquam perspiciatis odio vel beatae quis officia delectus voluptatem!</p>
</body>
</html>
