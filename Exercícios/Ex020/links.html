<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

/* SELETORES PERSONALIZADOS:
#  = id
.  = class
:  = pseudo-class
:: = pseudo-element
>  = filho/children
*/

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }

        a.especial {
            background-color: rgb(234, 125, 125);
            color: blue;
        }

        a::before {
            content: '⇒';
        }

        a::after {
            content: '⇐';
        
        }

        
    </style>
</head>
<body>
    <h1>Personalizando Itens.</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara" target="_blank" rel="external">Repositorio GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank" rel="external" class="especial">Canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank" rel="external" class="especial">Site do curso em video</a></li>
    </ul>
</body>
</html>
